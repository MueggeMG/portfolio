<!doctype html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess 2.0 – Tech Stack Architektur</title>
    <style>
        body {
            margin: 0;
            padding: 24px;
            background: #0a0a0a;
            font-family: sans-serif;
            min-height: 100vh;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
            max-width: 900px;
            margin: 0 auto;
        }

        .node {
            cursor: pointer;
        }

        .node:hover rect,
        .node:hover circle,
        .node:hover ellipse {
            opacity: 0.85;
        }

        .t {
            font-size: 14px;
            font-weight: 400;
            fill: #f5f3ee;
            font-family: sans-serif;
        }

        .th {
            font-size: 14px;
            font-weight: 500;
            fill: #f5f3ee;
            font-family: sans-serif;
        }

        .ts {
            font-size: 12px;
            font-weight: 400;
            fill: #888888;
            font-family: sans-serif;
        }

        /* box = neutral */
        .box rect {
            fill: #1a1a1a;
            stroke: rgba(245, 243, 238, 0.15);
        }

        .box text.th {
            fill: #f5f3ee;
        }

        .box text.ts {
            fill: #888888;
        }

        /* c-purple */
        .c-purple>rect,
        .c-purple>ellipse,
        .c-purple>circle {
            fill: #EEEDFE;
            stroke: #534AB7;
        }

        .c-purple>text.th {
            fill: #3C3489;
        }

        .c-purple>text.ts {
            fill: #534AB7;
        }

        /* c-teal */
        .c-teal>rect,
        .c-teal>ellipse,
        .c-teal>circle {
            fill: #E1F5EE;
            stroke: #0F6E56;
        }

        .c-teal>text.th {
            fill: #085041;
        }

        .c-teal>text.ts {
            fill: #0F6E56;
        }

        /* c-amber */
        .c-amber>rect,
        .c-amber>ellipse,
        .c-amber>circle {
            fill: #FAEEDA;
            stroke: #854F0B;
        }

        .c-amber>text.th {
            fill: #633806;
        }

        .c-amber>text.ts {
            fill: #854F0B;
        }

        /* c-gray */
        .c-gray>rect,
        .c-gray>ellipse,
        .c-gray>circle {
            fill: #F1EFE8;
            stroke: #5F5E5A;
        }

        .c-gray>text.th {
            fill: #2C2C2A;
        }

        .c-gray>text.ts {
            fill: #5F5E5A;
        }

        .arr {
            stroke: rgba(245, 243, 238, 0.25);
            stroke-width: 1.5;
            fill: none;
        }

        /* Tooltip */
        #tooltip {
            display: none;
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            border: 1px solid rgba(201, 168, 76, 0.4);
            color: #e8c97a;
            font-family: monospace;
            font-size: 12px;
            letter-spacing: 0.05em;
            padding: 10px 20px;
            max-width: 560px;
            text-align: center;
            pointer-events: none;
            z-index: 99;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <div id="tooltip"></div>

    <svg viewBox="0 0 680 790" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6"
                orient="auto-start-reverse">
                <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round" />
            </marker>
        </defs>

        <!-- FRONTEND CONTAINER -->
        <g class="c-purple">
            <rect x="42" y="50" width="596" height="190" rx="20" stroke-width="0.5" />
            <text class="th" x="340" y="78" text-anchor="middle" dominant-baseline="central">Browser · Frontend</text>
            <text class="ts" x="340" y="96" text-anchor="middle" dominant-baseline="central">Spieler A und Spieler B ·
                je eigener Browser</text>
        </g>

        <g class="node box"
            data-tip="Vite bündelt alle JS/CSS Dateien, startet den Dev Server mit Hot Reload und baut den fertigen Build für Render.com">
            <rect x="68" y="110" width="124" height="100" rx="8" stroke-width="0.5" />
            <text class="th" x="130" y="148" text-anchor="middle" dominant-baseline="central">Vite</text>
            <text class="ts" x="130" y="170" text-anchor="middle" dominant-baseline="central">Build · Dev Server</text>
        </g>

        <g class="node box"
            data-tip="chess.js prüft ob Züge legal sind, generiert FEN-Strings und erkennt Schachmat/Remis. Läuft im Browser jedes Spielers.">
            <rect x="211" y="110" width="124" height="100" rx="8" stroke-width="0.5" />
            <text class="th" x="273" y="148" text-anchor="middle" dominant-baseline="central">chess.js</text>
            <text class="ts" x="273" y="170" text-anchor="middle" dominant-baseline="central">Spiellogik · FEN</text>
        </g>

        <g class="node box"
            data-tip="Chessground ist Lichess' eigene Board Library — rendert Figuren, Animationen und Highlights. Bekommt Züge von chess.js und zeigt sie an.">
            <rect x="354" y="110" width="124" height="100" rx="8" stroke-width="0.5" />
            <text class="th" x="416" y="148" text-anchor="middle" dominant-baseline="central">Chessground</text>
            <text class="ts" x="416" y="170" text-anchor="middle" dominant-baseline="central">Brett · Figuren</text>
        </g>

        <g class="node box"
            data-tip="Stockfish läuft als Web Worker (separater Thread) im Browser. Im Multiplayer wird er nur im Einzelspieler-Modus genutzt — im PvP rechnet kein Stockfish.">
            <rect x="497" y="110" width="124" height="100" rx="8" stroke-width="0.5" />
            <text class="th" x="559" y="148" text-anchor="middle" dominant-baseline="central">Stockfish</text>
            <text class="ts" x="559" y="170" text-anchor="middle" dominant-baseline="central">KI · Web Worker</text>
        </g>

        <!-- Arrow Frontend ↔ Backend -->
        <line x1="340" y1="240" x2="340" y2="298" class="arr" marker-end="url(#arrow)" />
        <text class="ts" x="352" y="272" dominant-baseline="central">WebSocket</text>

        <!-- BACKEND CONTAINER -->
        <g class="c-teal">
            <rect x="142" y="303" width="396" height="162" rx="16" stroke-width="0.5" />
            <text class="th" x="340" y="329" text-anchor="middle" dominant-baseline="central">Server · Backend</text>
            <text class="ts" x="340" y="347" text-anchor="middle" dominant-baseline="central">Node.js · läuft auf
                Render.com</text>
        </g>

        <g class="node box"
            data-tip="Node.js ist JavaScript außerhalb des Browsers — die Laufzeit für unseren Server. npm läuft ebenfalls darauf.">
            <rect x="157" y="360" width="110" height="82" rx="8" stroke-width="0.5" />
            <text class="th" x="212" y="392" text-anchor="middle" dominant-baseline="central">Node.js</text>
            <text class="ts" x="212" y="412" text-anchor="middle" dominant-baseline="central">Server Runtime</text>
        </g>

        <g class="node box"
            data-tip="Express ist ein schlankes HTTP Framework für Node.js — zuständig für Routen, API Endpoints und den HTTP Server der Socket.io nutzt.">
            <rect x="285" y="360" width="110" height="82" rx="8" stroke-width="0.5" />
            <text class="th" x="340" y="392" text-anchor="middle" dominant-baseline="central">Express</text>
            <text class="ts" x="340" y="412" text-anchor="middle" dominant-baseline="central">HTTP · Routing</text>
        </g>

        <g class="node box"
            data-tip="Socket.io ermöglicht Echtzeit-Kommunikation via WebSockets. Verwaltet Spielräume (Rooms) — wenn Spieler A zieht, bekommt Spieler B den Zug sofort.">
            <rect x="413" y="360" width="110" height="82" rx="8" stroke-width="0.5" />
            <text class="th" x="468" y="392" text-anchor="middle" dominant-baseline="central">Socket.io</text>
            <text class="ts" x="468" y="412" text-anchor="middle" dominant-baseline="central">Echtzeit · Räume</text>
        </g>

        <!-- Claude API route (dashed, left side) -->
        <path d="M 142 384 L 100 384 L 100 500 L 137 500 L 137 510" fill="none" stroke="#BA7517" stroke-width="0.8"
            stroke-dasharray="5 3" marker-end="url(#arrow)" />

        <!-- Backend → GitHub -->
        <line x1="272" y1="465" x2="272" y2="510" stroke="rgba(245,243,238,0.2)" stroke-width="0.8" fill="none"
            marker-end="url(#arrow)" />

        <!-- Backend → Render -->
        <line x1="417" y1="465" x2="417" y2="510" stroke="rgba(245,243,238,0.2)" stroke-width="0.8" fill="none"
            marker-end="url(#arrow)" />

        <!-- EXTERNE DIENSTE -->
        <g class="node c-amber"
            data-tip="Claude API wird vom Backend angefragt (nicht direkt vom Browser) — so bleibt der API-Key sicher in einer .env Datei auf dem Server. Gibt Stellungsanalyse und Tipps zurück.">
            <rect x="42" y="510" width="140" height="75" rx="8" stroke-width="0.5" />
            <text class="th" x="112" y="537" text-anchor="middle" dominant-baseline="central">Claude API</text>
            <text class="ts" x="112" y="557" text-anchor="middle" dominant-baseline="central">Analyse · Tipps</text>
        </g>

        <g class="node c-gray"
            data-tip="GitHub speichert den Code. GitHub Actions baut automatisch das Projekt und deployt es auf Render.com bei jedem Push auf main.">
            <rect x="197" y="510" width="140" height="75" rx="8" stroke-width="0.5" />
            <text class="th" x="267" y="537" text-anchor="middle" dominant-baseline="central">GitHub</text>
            <text class="ts" x="267" y="557" text-anchor="middle" dominant-baseline="central">Code · CI/CD</text>
        </g>

        <g class="node c-gray"
            data-tip="Render.com hostet den Node.js Server kostenlos. Nachteil: schläft nach 15min Inaktivität ein (30sek Aufwachzeit). Lösung: UptimeRobot.">
            <rect x="352" y="510" width="140" height="75" rx="8" stroke-width="0.5" />
            <text class="th" x="422" y="537" text-anchor="middle" dominant-baseline="central">Render.com</text>
            <text class="ts" x="422" y="557" text-anchor="middle" dominant-baseline="central">Server Hosting</text>
        </g>

        <g class="node c-gray"
            data-tip="UptimeRobot pingt Render.com alle 10 Minuten kostenlos an — so schläft der Server nie ein. Ebenfalls kostenlos.">
            <rect x="507" y="510" width="131" height="75" rx="8" stroke-width="0.5" />
            <text class="th" x="572" y="537" text-anchor="middle" dominant-baseline="central">UptimeRobot</text>
            <text class="ts" x="572" y="557" text-anchor="middle" dominant-baseline="central">Ping · Wachdienst</text>
        </g>

        <!-- UptimeRobot → Render -->
        <line x1="507" y1="547" x2="492" y2="547" stroke="#BA7517" stroke-width="0.8" fill="none"
            marker-end="url(#arrow)" />

        <!-- Phase 3 arrow -->
        <path d="M 340 585 L 340 638" fill="none" stroke="#BA7517" stroke-width="0.8" stroke-dasharray="5 3"
            marker-end="url(#arrow)" />
        <text class="ts" x="352" y="613" dominant-baseline="central" fill="#BA7517">Phase 3</text>

        <!-- CUSTOM KI -->
        <g class="node c-amber"
            data-tip="Phase 3: Eine eigene KI wird trainiert um die benutzerdefinierten Spielmodi zu meistern. Reinforcement Learning — die KI lernt durch Spielen gegen sich selbst.">
            <rect x="165" y="643" width="350" height="75" rx="8" stroke-width="0.5" />
            <text class="th" x="340" y="669" text-anchor="middle" dominant-baseline="central">Custom KI Training</text>
            <text class="ts" x="340" y="689" text-anchor="middle" dominant-baseline="central">Eigene Modi ·
                Reinforcement Learning</text>
        </g>

        <!-- LEGEND -->
        <rect x="42" y="742" width="596" height="28" rx="4" fill="none" stroke="rgba(245,243,238,0.1)"
            stroke-width="0.5" />
        <line x1="58" y1="756" x2="82" y2="756" stroke="rgba(245,243,238,0.25)" stroke-width="1"
            marker-end="url(#arrow)" />
        <text class="ts" x="88" y="756" dominant-baseline="central">WebSocket</text>
        <line x1="196" y1="756" x2="220" y2="756" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3"
            marker-end="url(#arrow)" />
        <text class="ts" x="226" y="756" dominant-baseline="central">Claude / KI</text>
        <line x1="326" y1="756" x2="350" y2="756" stroke="rgba(245,243,238,0.2)" stroke-width="0.8"
            marker-end="url(#arrow)" />
        <text class="ts" x="356" y="756" dominant-baseline="central">Deployment</text>
        <rect x="456" y="749" width="11" height="11" rx="2" fill="#EF9F27" opacity="0.8" />
        <text class="ts" x="473" y="756" dominant-baseline="central">KI Layer</text>
        <rect x="544" y="749" width="11" height="11" rx="2" fill="#888780" opacity="0.8" />
        <text class="ts" x="561" y="756" dominant-baseline="central">Infra</text>
    </svg>

    <script>
        const tooltip = document.getElementById('tooltip');
        document.querySelectorAll('[data-tip]').forEach(el => {
            el.addEventListener('mouseenter', () => {
                tooltip.textContent = el.dataset.tip;
                tooltip.style.display = 'block';
            });
            el.addEventListener('mouseleave', () => {
                tooltip.style.display = 'none';
            });
        });
    </script>
</body>

</html>
